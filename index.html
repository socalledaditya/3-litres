<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3 Litres Daily</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="tracker-container">
        <span class="fire">🔥</span>
        <span id="streak-count">0</span>
    </div>
    <main>
      <h1 id="top-heading">Drink 3 Litres of Water Daily</h1>
      <div class="container">
        <img id="glass-png" src="glass.png" alt="glass.png-missing" />
        <div class="waterLevel-box"></div>
      </div>
      <div class="waterQuantityOptions">
        <h2 class="water-qty">150ml</h2>
        <h2 class="water-qty">250ml</h2>
        <h2 class="water-qty">350ml</h2>
        <button class="resetLevel-btn">reset</button>
      </div>
    </main>

    <section class="goal-achieved-section">
      <h2>Badhai ho! You Achieved Your Today's Goal</h2>
      <img src="congrats.gif" alt="congrats.gif-missing" />
      <button class="resetLevel-btn">reset</button>
    </section>

    <script src="script.js"></script>
  </body>
</html>
